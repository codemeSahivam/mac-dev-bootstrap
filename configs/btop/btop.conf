# btop — full dashboard layout (cpu, mem, net, proc) like reference

color_theme = "$HOME/.config/btop/themes/carbon.theme"
theme_background = True
true_color = True
rounded_corners = False
graph_symbol = "braille"
update_ms = 1000

shown_boxes = "cpu mem net proc"
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default"

proc_sorting = "cpu"
proc_tree = false
proc_colors = true
cpu_graph_lower = "total"
cpu_graph_upper = "total"
show_uptime = true
show_cpu_freq = true
mem_below_net = false
net_sync = false
net_auto = true
