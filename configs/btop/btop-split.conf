# btop — compact layout for Ghostty split panes (~50–70 cols wide)
# Used automatically in the dashboard left pane

color_theme = "$HOME/.config/btop/themes/carbon.theme"
theme_background = False
true_color = True
rounded_corners = False
graph_symbol = "block"
update_ms = 1500

# Minimal boxes — fits narrow vertical splits (no proc list)
shown_boxes = "cpu mem net"
presets = "cpu:0:default,mem:0:default,net:0:tty"

cpu_bottom = false
mem_below_net = true
show_uptime = false
show_cpu_freq = false
show_cpu_watts = false
show_disks = false
show_io_stat = false
net_sync = true
net_auto = true
