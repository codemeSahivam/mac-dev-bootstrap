# Classic — reference macOS prompt
# user@hostname ~ %

palette = "theme"

add_newline = true
scan_timeout = 10
command_timeout = 100

format = "$username$hostname$directory$character"

[username]
show_always = true
style_user = "bold fg"
style_root = "bold error"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold fg"
format = "@[$hostname]($style)"

[directory]
style = "fg"
truncate_to_repo = false
truncation_length = 8
home_symbol = "~"
format = " [$path]($style) "

[character]
success_symbol = "% "
error_symbol = "% "
vimcmd_symbol = "% "

[git_branch]
disabled = true
[git_status]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[python]
disabled = true
[docker_context]
disabled = true
[kubernetes]
disabled = true
[aws]
disabled = true
[cmd_duration]
disabled = true
[memory_usage]
disabled = true
